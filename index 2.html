<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="推拿紀錄">
<meta name="theme-color" content="#7B5C3E">
<title>顧客推拿紀錄</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F4EF; --card: #FFFFFF; --border: #E2DDD6;
    --accent: #7B5C3E; --accent-light: #A67C58; --accent-bg: #F2EAE0;
    --text: #2C2420; --text-sub: #8A7A70; --red: #C0392B;
    --green: #2E7D5A; --tag-bg: #EDE8E0;
  }
  body { font-family: -apple-system, 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .login-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; }
  .login-logo { font-size: 48px; margin-bottom: 16px; }
  .login-title { font-size: 22px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .login-sub { font-size: 14px; color: var(--text-sub); margin-bottom: 40px; text-align: center; }
  .btn-google { display: flex; align-items: center; gap: 12px; background: #fff; border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 24px; font-size: 16px; font-weight: 600; cursor: pointer; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .btn-google img { width: 22px; }
  .login-note { font-size: 12px; color: var(--text-sub); margin-top: 20px; text-align: center; }
  .loading-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  header { background: var(--accent); color: #fff; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; gap: 10px; flex-wrap: wrap; }
  header h1 { font-size: 17px; font-weight: 700; letter-spacing: 1px; }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .header-right span { font-size: 12px; opacity: .7; }
  .btn-hdr { background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.4); border-radius: 7px; padding: 5px 12px; font-size: 12px; cursor: pointer; }
  .user-avatar { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,.5); }

  /* Dashboard banner */
  .dashboard { padding: 14px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; gap: 10px; flex-wrap: wrap; }
  .dash-card { flex: 1; min-width: 140px; background: var(--accent-bg); border-radius: 10px; padding: 10px 14px; }
  .dash-label { font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: .5px; margin-bottom: 4px; }
  .dash-list { font-size: 13px; color: var(--text); line-height: 1.7; }
  .dash-empty { font-size: 13px; color: var(--text-sub); }

  .app { display: flex; height: calc(100vh - 108px); }
  .sidebar { width: 270px; min-width: 270px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-top { padding: 12px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  .sidebar-top input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--bg); outline: none; }
  .sidebar-top input:focus { border-color: var(--accent); }
  .btn-new { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 13px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .client-list { overflow-y: auto; flex: 1; }
  .client-item { padding: 11px 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; }
  .client-item:hover { background: var(--accent-bg); }
  .client-item.active { background: var(--accent-bg); border-left: 3px solid var(--accent); }
  .client-item .name { font-weight: 600; font-size: 15px; }
  .client-item .meta { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .client-item .visit-count { font-size: 11px; background: var(--tag-bg); color: var(--accent); padding: 2px 7px; border-radius: 10px; display: inline-block; margin-top: 4px; }
  .bday-badge { font-size: 11px; background: #fef3e2; color: #E67E22; padding: 2px 7px; border-radius: 10px; display: inline-block; margin-top: 4px; margin-left: 4px; }
  .empty-list { padding: 32px 16px; text-align: center; color: var(--text-sub); font-size: 14px; }

  .detail { flex: 1; overflow-y: auto; padding: 22px; }
  .detail-placeholder { height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-sub); font-size: 15px; }

  .profile-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); padding: 18px; margin-bottom: 18px; display: flex; align-items: flex-start; gap: 14px; }
  .avatar { width: 52px; height: 52px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; font-weight: 700; flex-shrink: 0; }
  .profile-info { flex: 1; }
  .profile-info h2 { font-size: 19px; font-weight: 700; }
  .profile-info .profile-meta { font-size: 13px; color: var(--text-sub); margin-top: 4px; line-height: 1.8; }
  .profile-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-edit, .btn-delete { padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); }
  .btn-edit { background: var(--card); color: var(--text); }
  .btn-delete { background: var(--card); color: var(--red); border-color: #f0c0bb; }

  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { padding: 7px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; color: var(--text-sub); border: 1px solid transparent; background: none; }
  .tab.active { background: var(--accent); color: #fff; }
  .tab:not(.active):hover { background: var(--tag-bg); }

  .section-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); margin-bottom: 14px; overflow: hidden; }
  .section-title { padding: 12px 16px; font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: .5px; border-bottom: 1px solid var(--border); background: var(--accent-bg); }
  .section-body { padding: 14px 16px; }
  .findings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .finding-item.full { grid-column: 1/-1; }
  .finding-label { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
  .finding-value { font-size: 14px; line-height: 1.6; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { background: var(--tag-bg); color: var(--accent); padding: 3px 9px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .tag.red { background: #fdecea; color: var(--red); }
  .tag.purple { background: #f3ecfb; color: #8E44AD; }
  .tag.orange { background: #fef3e2; color: #E67E22; }
  .tag.green { background: #e8f5ee; color: var(--green); }

  /* Ticket bar */
  .ticket-bar { display: flex; align-items: center; gap: 10px; background: var(--accent-bg); border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; }
  .ticket-info { flex: 1; font-size: 14px; }
  .ticket-remain { font-size: 22px; font-weight: 700; color: var(--accent); }
  .ticket-total { font-size: 12px; color: var(--text-sub); }
  .btn-ticket { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; }

  .visit-item { border-left: 3px solid var(--border); padding: 0 0 20px 16px; position: relative; margin-left: 6px; }
  .visit-item::before { content: ''; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; position: absolute; left: -7.5px; top: 2px; }
  .visit-item:last-child { padding-bottom: 0; }
  .visit-date { font-size: 12px; color: var(--text-sub); font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .visit-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .visit-block { flex: 1; min-width: 130px; }
  .visit-block-label { font-size: 10px; color: var(--text-sub); font-weight: 700; text-transform: uppercase; letter-spacing: .3px; margin-bottom: 3px; }
  .visit-block-val { font-size: 13px; line-height: 1.5; }
  .btn-add-visit { background: var(--accent-bg); color: var(--accent); border: 1.5px dashed var(--accent-light); border-radius: 10px; padding: 10px 0; width: 100%; font-size: 14px; cursor: pointer; margin-bottom: 14px; }
  .btn-report { background: #fff; color: var(--accent); border: 1px solid var(--accent); border-radius: 6px; padding: 3px 10px; font-size: 12px; cursor: pointer; white-space: nowrap; }

  /* Advice box */
  .advice-box { background: #f0faf4; border: 1.5px solid #a8d8b9; border-radius: 12px; padding: 16px; margin-top: 14px; }
  .advice-title { font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 10px; }
  .advice-content { font-size: 14px; line-height: 1.8; color: var(--text); white-space: pre-wrap; }
  .btn-gen-advice { background: var(--green); color: #fff; border: none; border-radius: 9px; padding: 10px 0; width: 100%; font-size: 14px; cursor: pointer; margin-top: 12px; font-weight: 600; }
  .btn-copy { background: #fff; color: var(--green); border: 1px solid var(--green); border-radius: 7px; padding: 6px 14px; font-size: 13px; cursor: pointer; margin-top: 10px; }

  .save-indicator { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity .3s; z-index: 300; pointer-events: none; }
  .save-indicator.show { opacity: 1; }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: var(--card); border-radius: 16px; width: 100%; max-width: 620px; max-height: 92vh; overflow-y: auto; padding: 22px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
  .modal h3 { font-size: 17px; margin-bottom: 18px; color: var(--accent); }
  .form-row { margin-bottom: 13px; }
  .form-row label { display: block; font-size: 11px; font-weight: 700; color: var(--text-sub); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .3px; }
  .form-row input, .form-row textarea, .form-row select { width: 100%; padding: 9px 11px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 14px; background: var(--bg); color: var(--text); outline: none; font-family: inherit; resize: vertical; }
  .form-row input:focus, .form-row textarea:focus { border-color: var(--accent); }
  .form-row textarea { min-height: 65px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .checkbox-group { display: flex; flex-wrap: wrap; gap: 7px; }
  .cb-item { display: flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer; background: var(--tag-bg); padding: 5px 10px; border-radius: 20px; border: 1.5px solid transparent; user-select: none; }
  .cb-item input { display: none; }
  .cb-item.checked { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .divider { font-size: 11px; font-weight: 700; color: var(--accent); background: var(--accent-bg); padding: 6px 10px; border-radius: 6px; margin: 16px 0 8px; letter-spacing: .5px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save { flex: 1; padding: 11px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; font-weight: 600; }
  .btn-cancel { padding: 11px 18px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; font-size: 15px; cursor: pointer; }

  .report-card { background: linear-gradient(135deg, #FFFAF5 0%, #F5EDE0 100%); border-radius: 16px; padding: 24px; max-width: 480px; margin: 0 auto; border: 1px solid #DDD0C0; }
  .report-header { text-align: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px solid #D4B896; }
  .report-studio { font-size: 11px; color: var(--accent-light); font-weight: 700; letter-spacing: 2px; margin-bottom: 4px; }
  .report-title { font-size: 18px; font-weight: 700; color: var(--accent); }
  .report-date { font-size: 12px; color: var(--text-sub); margin-top: 4px; }
  .report-name { font-size: 14px; font-weight: 600; color: var(--text); margin-top: 6px; }
  .report-section { margin-bottom: 16px; }
  .report-section-title { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1px; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #E8D8C4; }
  .report-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
  .report-dot { width: 6px; height: 6px; background: var(--accent-light); border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .report-text { font-size: 14px; line-height: 1.6; color: var(--text); }
  .report-highlight { background: #FFF0E0; border-left: 3px solid var(--accent); padding: 10px 14px; border-radius: 0 8px 8px 0; font-size: 14px; line-height: 1.7; color: var(--text); margin-top: 6px; }
  .report-footer { text-align: center; margin-top: 20px; padding-top: 14px; border-top: 1px solid #E8D8C4; font-size: 12px; color: var(--text-sub); line-height: 1.8; }
  .report-footer strong { color: var(--accent); }
  .report-tip { background: var(--accent); color: #fff; border-radius: 10px; padding: 12px 16px; font-size: 13px; line-height: 1.7; margin-top: 14px; }
  .report-advice { background: #f0faf4; border: 1px solid #a8d8b9; border-radius: 10px; padding: 12px 16px; font-size: 13px; line-height: 1.7; margin-top: 14px; color: var(--text); }
  .hint-text { font-size: 12px; color: var(--text-sub); text-align: center; margin-bottom: 14px; }

  @media(max-width: 640px) {
    .app { flex-direction: column; height: auto; }
    .sidebar { width: 100%; min-width: 0; height: auto; max-height: 220px; }
    .detail { padding: 12px; }
    .findings-grid { grid-template-columns: 1fr; }
    .profile-card { flex-wrap: wrap; }
    .form-row-2 { grid-template-columns: 1fr; }
    .dashboard { padding: 10px; }
  }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <div style="color:var(--text-sub);font-size:14px">載入中…</div>
</div>

<div class="login-screen" id="loginScreen" style="display:none">
  <div class="login-logo">🌿</div>
  <div class="login-title">顯德筋絡調理室</div>
  <div class="login-sub">顧客推拿紀錄系統<br>請用 Google 帳號登入</div>
  <button class="btn-google" onclick="signIn()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
    使用 Google 帳號登入
  </button>
  <div class="login-note">資料儲存在雲端，任何裝置都能存取</div>
</div>

<div id="appScreen" style="display:none">
  <header>
    <h1>顯德筋絡調理室</h1>
    <div class="header-right">
      <span id="clientCount">0 位顧客</span>
      <img id="userAvatar" class="user-avatar" style="display:none">
      <button class="btn-hdr" onclick="signOut()">登出</button>
    </div>
  </header>

  <!-- 今日提醒儀表板 -->
  <div class="dashboard" id="dashboard"></div>

  <div class="app">
    <div class="sidebar">
      <div class="sidebar-top">
        <input type="text" id="searchInput" placeholder="搜尋姓名或生日…" oninput="renderList()">
        <button class="btn-new" onclick="openNewClientModal()">＋ 新增</button>
      </div>
      <div class="client-list" id="clientList">
        <div class="empty-list">尚無顧客紀錄</div>
      </div>
    </div>
    <div class="detail" id="detail">
      <div class="detail-placeholder">← 選擇左側顧客查看紀錄</div>
    </div>
  </div>
</div>

<div id="modalBg" class="modal-bg" style="display:none" onclick="closeModalOnBg(event)">
  <div class="modal" id="modalContent"></div>
</div>
<div class="save-indicator" id="saveIndicator">✓ 已儲存</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDkLms4g5-UPuMQcFl0pvxGU8bsqdLEqA0",
  authDomain: "sian-customer-records.firebaseapp.com",
  projectId: "sian-customer-records",
  storageBucket: "sian-customer-records.firebasestorage.app",
  messagingSenderId: "408702062626",
  appId: "1:408702062626:web:5317965599bd8678feba7b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();
let currentUser = null;
let clients = [];
let unsubscribe = null;

onAuthStateChanged(auth, user => {
  document.getElementById('loadingScreen').style.display = 'none';
  if (user) {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    const av = document.getElementById('userAvatar');
    if (user.photoURL) { av.src = user.photoURL; av.style.display = 'block'; }
    startListening();
  } else {
    currentUser = null;
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }
});

window.signIn = async () => { try { await signInWithPopup(auth, provider); } catch(e) { alert('登入失敗：' + e.message); } };
window.signOut = async () => { if (unsubscribe) { unsubscribe(); unsubscribe = null; } await fbSignOut(auth); };

function startListening() {
  const col = collection(db, 'users', currentUser.uid, 'clients');
  unsubscribe = onSnapshot(col, snap => {
    clients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderList();
    renderDashboard();
    if (window.currentId) renderDetail();
  });
}

window.saveClient = async (c) => {
  const col = collection(db, 'users', currentUser.uid, 'clients');
  await setDoc(doc(col, c.id), c);
  showSaved();
};
window.removeClient = async (id) => {
  const col = collection(db, 'users', currentUser.uid, 'clients');
  await deleteDoc(doc(col, id));
};
function showSaved() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}
window._clients = () => clients;
</script>

function generateAdvice(muscleList) {
  if (!muscleList || !muscleList.length) return '';
  const stretches = [];
  const avoids = [];
  const seen = new Set();
  muscleList.forEach(m => {
    const key = Object.keys(ADVICE_DB).find(k => m.includes(k));
    if (key && !seen.has(key)) {
      seen.add(key);
      stretches.push(`• ${m}：${ADVICE_DB[key].stretch}`);
      avoids.push(`• ${ADVICE_DB[key].avoid}`);
    }
  });
  if (!stretches.length) return '';
  let txt = '🌿 今天調理後的居家保養建議\n\n';
  txt += '【建議做的拉伸】\n' + stretches.join('\n');
  txt += '\n\n【暫時避免的動作】\n' + [...new Set(avoids)].join('\n');
  txt += '\n\n身體需要時間慢慢恢復，拉伸動作請輕柔不要勉強，有任何不適歡迎 LINE 我 🙏';
  return txt;
}

let currentId = null;
let currentTab = 'overview';
window.currentId = null;

function getClients() { return typeof window._clients === 'function' ? window._clients() : []; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function initials(name) { return name ? name.slice(0,1) : '?'; }
function today() { return new Date().toISOString().slice(0,10); }
function todayMMDD() { const d = new Date(); return `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function thisWeekMMDDs() {
  const days = [];
  for (let i=0; i<7; i++) {
    const d = new Date(); d.setDate(d.getDate()+i);
    days.push(`${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  }
  return days;
}

function renderDashboard() {
  const clients = getClients();
  const tmmd = todayMMDD();
  const weekDays = thisWeekMMDDs();
  const bdayToday = clients.filter(c => c.birthday && c.birthday.slice(5) === tmmd);
  const bdayWeek = clients.filter(c => c.birthday && weekDays.includes(c.birthday.slice(5)) && c.birthday.slice(5) !== tmmd);

  let html = '';
  if (bdayToday.length) {
    html += `<div class="dash-card" style="background:#fff8e8;border:1px solid #f0d080">
      <div class="dash-label">🎂 今天生日</div>
      <div class="dash-list">${bdayToday.map(c=>`<span style="cursor:pointer;color:var(--accent);font-weight:600" onclick="selectClient('${c.id}')">${c.name}</span>`).join('、')}</div>
    </div>`;
  }
  if (bdayWeek.length) {
    html += `<div class="dash-card">
      <div class="dash-label">🎈 本週生日</div>
      <div class="dash-list">${bdayWeek.map(c=>`<span style="cursor:pointer" onclick="selectClient('${c.id}')">${c.name}（${c.birthday.slice(5)}）</span>`).join('、')}</div>
    </div>`;
  }
  if (!html) {
    html = `<div style="font-size:13px;color:var(--text-sub);padding:4px 0">今天沒有特別提醒 ✨</div>`;
  }
  document.getElementById('dashboard').innerHTML = html;
}

function renderList() {
  const q = (document.getElementById('searchInput')||{value:''}).value.trim().toLowerCase();
  const list = document.getElementById('clientList');
  if (!list) return;
  const clients = getClients();
  const filtered = q ? clients.filter(c => c.name.toLowerCase().includes(q) || (c.birthday||'').includes(q) || (c.phone||'').includes(q)) : clients;
  document.getElementById('clientCount').textContent = `${clients.length} 位顧客`;
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-list">${q ? '找不到符合的顧客' : '尚無顧客紀錄<br>點「新增」建立第一位'}</div>`;
    return;
  }
  const tmmd = todayMMDD();
  const sorted = [...filtered].sort((a,b) => a.name.localeCompare(b.name, 'zh-TW'));
  list.innerHTML = sorted.map(c => {
    const visits = c.visits || [];
    const lastVisit = visits.length ? visits[visits.length-1].date : '未有紀錄';
    const isBday = c.birthday && c.birthday.slice(5) === tmmd;
    return `<div class="client-item ${c.id===currentId?'active':''}" onclick="selectClient('${c.id}')">
      <div class="name">${c.name}${isBday?' 🎂':''}</div>
      <div class="meta">${c.birthday?`🎂 ${c.birthday}　`:''}${c.gender||''}</div>
      <div class="meta">最後到診：${lastVisit}</div>
      <span class="visit-count">共 ${visits.length} 次</span>

  }).join('');
}

function openReportCard(clientId, visitId) {
  const c = getClients().find(x=>x.id===clientId);
  const v = (c.visits||[]).find(x=>x.id===visitId);
  if (!v) return;
  const pelvisTags = v.pelvis ? v.pelvis.split('、').filter(Boolean) : [];
  const muscleTags = v.tightMuscles ? v.tightMuscles.split('、').filter(Boolean) : [];
  const sourceTags = v.painSource ? v.painSource.split('、').filter(Boolean) : [];
  const pelvisMap = {'左高右低':'骨盆往左邊偏高','右高左低':'骨盆往右邊偏高','前傾':'骨盆前傾（重心前移）','後傾':'骨盆後傾（塌腰）','左旋':'骨盆往左旋轉','右旋':'骨盆往右旋轉','無明顯偏移':'骨盆目前無明顯偏移'};
  const pelvisHuman = pelvisTags.map(p => pelvisMap[p]||p);
  openModal(`
    <h3>本次評估報告卡</h3>
    <p class="hint-text">截圖這張卡片傳給客人 LINE 📸</p>
    <div class="report-card">
      <div class="report-header">
        <div class="report-studio">顯德筋絡調理室</div>
        <div class="report-title">本次調理報告</div>
        <div class="report-date">${v.date}</div>
        <div class="report-name">📋 ${c.name} 您好</div>
      </div>
      ${v.chiefComplaint?`<div class="report-section"><div class="report-section-title">您這次說的不舒服</div><div class="report-highlight">${v.chiefComplaint}</div></div>`:''}
      ${pelvisHuman.length?`<div class="report-section"><div class="report-section-title">骨盆狀態</div>${pelvisHuman.map(p=>`<div class="report-row"><div class="report-dot"></div><div class="report-text">${p}</div></div>`).join('')}</div>`:''}
      ${muscleTags.length?`<div class="report-section"><div class="report-section-title">今天比較緊繃的區域</div>${muscleTags.map(m=>`<div class="report-row"><div class="report-dot"></div><div class="report-text">${m}</div></div>`).join('')}</div>`:''}
      ${sourceTags.length?`<div class="report-section"><div class="report-section-title">找到的問題根源</div>${sourceTags.map(s=>`<div class="report-row"><div class="report-dot"></div><div class="report-text">${s}</div></div>`).join('')}</div>`:''}
      ${v.result?`<div class="report-section"><div class="report-section-title">調理後的狀況</div><div class="report-highlight">${v.result}</div></div>`:''}
      ${v.nextPlan?`<div class="report-tip">💡 <strong>下次建議</strong><br>${v.nextPlan}</div>`:''}
      ${v.advice?`<div class="report-advice">🌿 <strong>居家保養建議</strong><br><br>${v.advice.replace(/\n/g,'<br>')}</div>`:''}
      <div class="report-footer">身體的改變需要時間，每一次調理都是一步。<br><br><strong>有任何問題歡迎 LINE 我 🙏</strong></div>
    </div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">關閉</button></div>`);
}

function openTicketModal(id) {

  openModal(`<h3>套票／堂數設定</h3>
    <div class="form-row-2">
      <div class="form-row"><label>購買總堂數</label><input id="t-total" type="number" min="0" value="${c.ticketTotal||0}"></div>

    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveTicket('${id}')">儲存</button>
    </div>`);
}
async function saveTicket(id) {
  const c = getClients().find(x=>x.id===id);
  c.ticketTotal = parseInt(document.getElementById('t-total').value)||0;
  c.ticketUsed = parseInt(document.getElementById('t-used').value)||0;
  c.ticketNote = document.getElementById('t-note').value;
  await window.saveClient(c); closeModal(); renderDetail();
}
async function useTicket(id) {
  const c = getClients().find(x=>x.id===id);
  const remain = (c.ticketTotal||0) - (c.ticketUsed||0);
  if (remain <= 0) { alert('堂數已用完，請先補充套票。'); return; }
  if (!confirm(`確定扣除 ${c.name} 1堂？剩餘 ${remain-1} 堂。`)) return;
  c.ticketUsed = (c.ticketUsed||0) + 1;
  await window.saveClient(c); renderDetail();
}

function openModal(html) { document.getElementById('modalContent').innerHTML = html; document.getElementById('modalBg').style.display = 'flex'; }
function closeModal() { document.getElementById('modalBg').style.display = 'none'; }
function closeModalOnBg(e) { if (e.target.id==='modalBg') closeModal(); }
function buildCheckboxes(name, options, selected=[]) {
  return options.map(o => {
    const checked = selected.includes(o);
    return `<label class="cb-item ${checked?'checked':''}" onclick="toggleCb(this)"><input type="checkbox" name="${name}" value="${o}" ${checked?'checked':''}>${o}</label>`;
  }).join('');
}
function toggleCb(el) { const inp=el.querySelector('input'); inp.checked=!inp.checked; el.classList.toggle('checked',inp.checked); }
function getChecked(name) { return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(i=>i.value); }

  c.painSourceNote=document.getElementById('f-source-note').value;
  await window.saveClient(c); closeModal(); renderDetail();
}

function openAddVisitModal(id) {
  const mCb = Object.entries(MUSCLE_GROUPS).map(([g,opts])=>`<div class="divider">${g}</div><div class="form-row"><div class="checkbox-group">${buildCheckboxes('v-muscles',opts,[])}</div></div>`).join('');
  const sCb = Object.entries(SOURCE_OPTIONS).map(([g,opts])=>`<div class="divider">${g}</div><div class="form-row"><div class="checkbox-group">${buildCheckboxes('v-source',opts,[])}</div></div>`).join('');
  openModal(`<h3>新增到診紀錄</h3>
    <div class="form-row"><label>到診日期 *</label><input id="v-date" type="date" value="${today()}"></div>
    <div class="form-row"><label>本次主訴</label><textarea id="v-complaint" placeholder="客人這次說哪裡不舒服…"></textarea></div>
    <div class="divider">骨盆（本次觀察）</div>
    <div class="form-row"><div class="checkbox-group">${buildCheckboxes('v-pelvis',PELVIS_OPTIONS,[])}</div></div>
    <div class="form-row"><label>骨盆補充</label><input id="v-pelvis-note" placeholder="改善中、比上次好…"></div>
    <br><div style="font-size:13px;font-weight:700;color:var(--accent)">▍本次緊繃肌群</div>${mCb}
    <div class="form-row"><label>其他緊繃（自填）</label><input id="v-other-muscle" placeholder="其他部位…"></div>
    <br><div style="font-size:13px;font-weight:700;color:var(--accent)">▍本次疼痛來源判斷</div>${sCb}
    <div class="form-row"><label>來源補充說明</label><textarea id="v-source-note" placeholder="詳細描述…"></textarea></div>
    <div class="form-row"><label>本次處理手法</label><textarea id="v-treatment" placeholder="做了什麼、處理了哪個區域…"></textarea></div>
    <div class="form-row"><label>修完後狀況</label><textarea id="v-result" placeholder="當場回饋、症狀改善程度…"></textarea></div>
    <div class="form-row"><label>下次計畫 / 給客人的建議</label><input id="v-next" placeholder="例：建議下週再來鞏固…"></div>
    <div id="advice-area"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" style="background:var(--green)" onclick="previewAdvice('${id}')">生成居家建議 →</button>
      <button class="btn-save" onclick="saveVisit('${id}')">直接儲存</button>
    </div>`);
}

function previewAdvice(id) {
  const muscles = getChecked('v-muscles');
  const other = document.getElementById('v-other-muscle').value;
  const all = [...muscles, ...(other ? other.split('、') : [])].filter(Boolean);
  const advice = generateAdvice(all);
  const area = document.getElementById('advice-area');
  if (!advice) { area.innerHTML = '<div style="color:var(--text-sub);font-size:13px;margin-top:10px">沒有勾選到有建議資料的肌群，請直接儲存。</div>'; return; }
  area.innerHTML = `
    <div class="advice-box">
      <div class="advice-title">🌿 自動生成的居家建議（可修改）</div>
      <textarea class="advice-content" id="advice-text" style="width:100%;min-height:200px;border:none;background:transparent;font-size:13px;line-height:1.8;resize:vertical">${advice}</textarea>
      <button class="btn-copy" onclick="copyAdvice()">複製文字</button>
    </div>`;
}

function copyAdvice() {
  const t = document.getElementById('advice-text');
  if (!t) return;
  navigator.clipboard.writeText(t.value).then(()=>alert('已複製！可以直接貼到 LINE 傳給客人'));
}

async function saveVisit(id) {
  const c = getClients().find(x=>x.id===id);
  const date = document.getElementById('v-date').value;
  if (!date) { alert('請選擇日期'); return; }
  if (!c.visits) c.visits=[];
  const pelvis=getChecked('v-pelvis');
  const pelvisNote=document.getElementById('v-pelvis-note').value;
  const tightMuscles=getChecked('v-muscles');
  const otherMuscle=document.getElementById('v-other-muscle').value;
  const painSource=getChecked('v-source');
  const sourceNote=document.getElementById('v-source-note').value;
  const adviceEl = document.getElementById('advice-text');
  c.visits.push({
    id:uid(), date,
    chiefComplaint:document.getElementById('v-complaint').value,
    pelvis:[...pelvis,pelvisNote].filter(Boolean).join('、'),
    tightMuscles:[...tightMuscles,otherMuscle].filter(Boolean).join('、'),
    painSource:[...painSource,sourceNote].filter(Boolean).join('、'),
    treatment:document.getElementById('v-treatment').value,
    result:document.getElementById('v-result').value,
    nextPlan:document.getElementById('v-next').value,
    advice: adviceEl ? adviceEl.value : '',
  });
  c.visits.sort((a,b)=>a.date.localeCompare(b.date));
  await window.saveClient(c); closeModal(); currentTab='visits'; renderDetail();
}

async function deleteVisit(clientId, visitId) {
  if (!confirm('確定要刪除這筆到診紀錄？')) return;
  const c = getClients().find(x=>x.id===clientId);
  c.visits = c.visits.filter(v=>v.id!==visitId);
  await window.saveClient(c); renderDetail();
}

async function deleteClient(id) {
  const c = getClients().find(x=>x.id===id);
  if (!confirm(`確定要刪除「${c.name}」的所有紀錄？此動作無法還原。`)) return;
  await window.removeClient(id);
  currentId=null; window.currentId=null; renderDetail();
}
</script>
</body>
</html>
